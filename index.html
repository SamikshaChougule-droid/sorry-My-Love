<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:140px;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd6e0);
background-size:400% 400%;
animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left}
100%{background-position:right}
}

h1{color:#ff4d6d}

button{
padding:14px 26px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
box-shadow:0 6px 15px rgba(255,0,100,0.4);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:fixed;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<h1>Hi ❤️</h1>
<h2>I Made Something For You 🥺</h2>
<p>This little website is just to say sorry 💌</p>

<button onclick="nextPage()">Start</button>

<script>
function nextPage(){
window.location.href="apology.html";
}

for(let i=0;i<30;i++){
let h=document.createElement("div");
h.innerHTML="❤️";
h.className="heart";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*5+4)+"s";
document.body.appendChild(h);
}
</script>

</body>
</html>
