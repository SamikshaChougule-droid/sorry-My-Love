<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>A Small Quiz For You 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins, sans-serif;
background:linear-gradient(135deg,#f6f7fb,#e9ecf5);
}

/* card */

.container{
background:white;
padding:50px;
width:520px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

/* heading */

h1{
font-size:36px;
color:#333;
margin-bottom:20px;
}

/* question */

.question{
font-size:20px;
color:#555;
margin-bottom:20px;
}

/* options */

button{
display:block;
width:100%;
margin:10px 0;
padding:14px;
font-size:16px;
border:none;
border-radius:6px;
background:#6c8ed9;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#567ad0;
transform:scale(1.03);
}

#result{
margin-top:20px;
font-size:18px;
color:#444;
}

.nextBtn{
margin-top:25px;
display:none;
}

</style>
</head>


<body>

<div class="container">

<h1>Little Quiz For You 💖</h1>

<div class="question">
How special are you to me? 🥺
</div>

<button onclick="checkAnswer(false)">Just a normal friend 🙂</button>
<button onclick="checkAnswer(false)">Someone I know 😅</button>
<button onclick="checkAnswer(true)">Someone very special to me 💞</button>
<button onclick="checkAnswer(false)">I don't know 🤔</button>

<div id="result"></div>

<button class="nextBtn" onclick="nextPage()">Continue 💌</button>

</div>


<script>

function checkAnswer(correct){

var result=document.getElementById("result");
var next=document.querySelector(".nextBtn");

if(correct){
result.innerHTML="Correct 💖 You really are very special to me.";
next.style.display="block";
}
else{
result.innerHTML="Hmm not exactly 🥺 Try again.";
}

}

function nextPage(){
window.location.href="love.html";
}

</script>

</body>

</html>
