<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Apology</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:120px;
background:#ffd6e0;
}

h1{color:#ff4d6d}

button{
padding:14px 26px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

.heart{
position:fixed;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<h1>I'm Really Sorry 🥺</h1>

<p>
I know I made a mistake.<br>
I never wanted to hurt you.<br>
You mean a lot to me ❤️<br>
Please forgive me.
</p>

<button onclick="nextPage()">Something I Want To Tell You</button>

<script>
function nextPage(){
window.location.href="love.html";
}

for(let i=0;i<25;i++){
let h=document.createElement("div");
h.innerHTML="❤️";
h.className="heart";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
}
</script>

</body>
</html>
