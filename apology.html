<!DOCTYPE html>
<html>
<head>
<title>My Apology</title>

<style>
body{
margin-top:120px;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ffd6e0,#ffc2d1);
}

button{
padding:14px 24px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
}

.heart{
position:fixed;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}
</style>

</head>

<body>

<h1>My Apology 🥺💔</h1>

<p>
I know I made a mistake.<br>
I never wanted to hurt you.<br>
You mean so much to me ❤️<br>
I really hope you forgive me.
</p>

<button onclick="next()">Something I Want To Tell You 💕</button>

<script>

function next(){
window.location.href="love.html";
}

for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
}

</script>

</body>
</html>
